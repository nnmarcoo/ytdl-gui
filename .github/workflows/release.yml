name: Release

# Build Windows + Linux binaries and attach them to a GitHub Release whenever a
# version tag (e.g. v1.0.0) is pushed. Also runnable manually to test the build.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: ytdl-gui-linux
          - os: windows-latest
            asset: ytdl-gui-windows.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Fetch ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L -o ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar xf ffmpeg.tar.xz
          echo "FFMPEG_BIN=$(pwd)/$(ls -d ffmpeg-*-amd64-static)/ffmpeg" >> "$GITHUB_ENV"

      - name: Fetch ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $bin = (Get-ChildItem -Recurse -Filter ffmpeg.exe ffmpeg_extracted | Select-Object -First 1).FullName
          "FFMPEG_BIN=$bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build binary
        run: pyinstaller --noconfirm ytdl-gui.spec

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: mv dist/ytdl-gui "dist/${{ matrix.asset }}"

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item dist/ytdl-gui.exe "dist/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          generate_release_notes: true
